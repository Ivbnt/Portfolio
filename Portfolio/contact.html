    body {
      background-color: #FAF3E0; /* Crème Premium */

    .contact-logo {
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .contact-logo:hover {
      transform: scale(1.1);
      box-shadow: 0 10px 15px rgba(0, 0, 0, 0.2);
    }
  </style>
</head>

                <li>

                        <span class="original">

</div>

  <!-- Conteneur Principal -->
  <div class="min-h-screen pt-28 px-8 py-20 max-w-7xl mx-auto text-center">
    <!-- Titre de la page -->
    <div class="mb-12">
      <h1 class="text-6xl font-extrabold uppercase tracking-wide">
        Contact Me
      </h1>
      <p class="text-lg text-gray-700 mt-4">
        Feel free to reach out via email, LinkedIn, or GitHub.
      </p>
    </div>

    <!-- Logos de Contact -->
    <div class="flex flex-wrap justify-center items-center gap-12 mt-12">
      <!-- Logo Gmail -->
      <a href="mailto:your-email@example.com" target="_blank" class="contact-logo">
        <img 
          src="https://upload.wikimedia.org/wikipedia/commons/thumb/a/ab/Gmail_Icon.svg/1024px-Gmail_Icon.svg.png" 
          alt="Gmail" 
          class="w-24 h-24 md:w-32 md:h-32"
        />
      </a>
      <!-- Logo LinkedIn -->
      <a href="https://linkedin.com/in/yourlinkedin" target="_blank" class="contact-logo">
        <img 
          src="https://upload.wikimedia.org/wikipedia/commons/c/ca/LinkedIn_logo_initials.png" 
          alt="LinkedIn" 
          class="w-24 h-24 md:w-32 md:h-32"
        />
      </a>
      <!-- Logo GitHub -->
      <a href="https://github.com/yourgithub" target="_blank" class="contact-logo">
        <img 
          src="https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png" 
          alt="GitHub" 
          class="w-24 h-24 md:w-32 md:h-32"
        />
      </a>
    </div>
  </div>

  <!-- Footer -->
  <footer class="text-center text-sm text-gray-500 py-6 mt-12">
