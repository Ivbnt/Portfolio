<!DOCTYPE html>
<html lang="fr">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Portfolio - Sticky & Z-Index</title>

  <!-- Tailwind CSS (CDN) -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Votre CSS personnalisé -->
  <link rel="stylesheet" href="index.css">

  <style>
    /* Conteneur principal : 3 "écrans" => 300vh */
    #carrouseel {
      position: relative;
      height: 300vh;
      /* 
        Vous pouvez ajuster la valeur si vous voulez
        plus ou moins de sections, 
        ou si vous souhaitez un autre comportement
      */
    }

    /* 
     * Chaque section est "sticky" => reste collée en haut
     * top: 0 => on la fixe en haut lorsque son scroll atteint ce point
     * width: 100%, height: 100vh => plein écran
     */
    #Work, #work1, #work2 {
      position: sticky;
      top: 0;
      width: 100%;
      height: 100vh; /* un écran */
    }

    /* 
     * Ordre d'empilement :
     * - #work2 (z-index: 30) => au-dessus de tout
     * - #work1 (z-index: 20) => en dessous de work2 
     * - #Work  (z-index: 10) => au fond
     *
     * Les margin-top négatifs font en sorte que 
     * #work1 débute 100vh plus tôt, 
     * et #work2 débute 200vh plus tôt 
     * dans le flux, 
     * donc ils "arrivent" plus tôt lors du scroll.
     */

    #Work {
      z-index: 10;
      margin-top: 0;      /* pas de marge : il commence "normalement" */
    }
    #work1 {
      z-index: 20;        
      margin-top: -100vh; /* il va commencer 1 écran plus tôt */
    }
    #work2 {
      z-index: 30;
      margin-top: -200vh; /* il va commencer 2 écrans plus tôt */
    }

    /* Juste pour que les sections soient visibles (couleurs de fond) */
    #work1 {
      background-color: #fee2e2; /* rouge pâle (Tailwind: bg-red-100) */
    }
    #work2 {
      background-color: #d9f99d; /* vert pâle (Tailwind: bg-green-100) */
    }
  </style>
</head>
